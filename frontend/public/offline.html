<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OfflinePay | Protocol Offline</title>
    <style>
        :root {
            --accent-cyan: #00f5ff;
            --bg-dark: #0a0f1e;
        }
        body {
            background: var(--bg-dark);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .bolt {
            width: 80px;
            height: 80px;
            background: rgba(0, 245, 255, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 245, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 245, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 245, 255, 0); }
        }
        h1 {
            text-transform: uppercase;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -1px;
            margin: 0;
            font-size: 24px;
        }
        p {
            color: #8f9bb3;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
            max-width: 250px;
            line-height: 1.6;
        }
        .status-badge {
            margin-top: 40px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        button {
            margin-top: 40px;
            background: var(--accent-cyan);
            color: #0a0f1e;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="bolt">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--accent-cyan)">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
    </div>
    <h1>Vault Active</h1>
    <p>The network is currently unreachable, but your vault is fully functional offline.</p>
    
    <div class="status-badge">
        <div class="dot"></div>
        P2P Protocol: Ready
    </div>

    <button onclick="window.location.reload()">Retry Connection</button>

    <script>
        // Check IndexedDB for pending transactions to show count
        const request = indexedStore = window.indexedDB.open('OfflinePay_Saurabh'); 
        // This is a bit tricky since the DB name is dynamic. 
        // For a generic offline page, we can just say "Fully Functional".
    </script>
</body>
</html>
